name: Build (Windows/MSYS2)

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64 # This automatically sets up the /mingw64/bin paths
          update: true

      - name: Install packages
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm mingw-w64-x86_64-toolchain mingw-w64-x86_64-make git

      - name: Build (MSYS2 /mingw64)
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE"
          which gcc || echo "gcc not found"
          which mingw32-make || echo "make not found"
          mingw32-make # Use mingw32-make instead of make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpgl-windows
          path: out/*
