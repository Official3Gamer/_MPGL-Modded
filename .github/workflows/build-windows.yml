name: Build (Windows/MSYS2)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64 
          update: true

      - name: Install packages
        shell: msys2 {0}
        # CHANGED: Replaced mingw-w64-x86_64-make with standard make
        run: |
          pacman -S --noconfirm mingw-w64-x86_64-toolchain make git

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build (MSYS2 /mingw64)
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE"
          which gcc || echo "gcc not found"
          which make || echo "make not found"
          make # Back to standard make!

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpgl-windows
          path: out/*
